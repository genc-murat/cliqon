name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux bağımlılıkları
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Verify Secrets (Diagnostic)
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is MISSING! Release build cannot be signed."
            exit 1
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is present."
            # Debug: Check if key looks like a minisign key (not showing full key)
            KEY_START=$(echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | head -c 20)
            echo "Key starts with: $KEY_START"
            if [[ ! "$KEY_START" =~ "untrusted comment" ]]; then
              echo "::warning::Key does not seem to start with 'untrusted comment'. Is it a valid minisign key?"
            fi
          fi
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "Note: TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not set."
          fi

      - name: Build Tauri app
        run: npm run tauri build -- --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: true

      - name: Recursive Bundle Search (Debug)
        shell: bash
        run: |
          echo "Listing all files in src-tauri/target/release/bundle recursively:"
          find src-tauri/target/release/bundle -type f
          echo "Searching specifically for signature files:"
          find src-tauri/target/release/bundle -name "*.sig"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cliqon-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/*.json
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts structure
        run: find artifacts -type f

      - name: Prepare Updater latest.json
        run: |
          mkdir -p release_assets
          # Build latest.json from artifacts and signatures
          python3 -c "
          import json, os, glob, sys, re, datetime
          
          def get_version():
              try:
                  with open('src-tauri/tauri.conf.json') as f:
                      return json.load(f).get('version')
              except:
                  return None

          version = get_version()
          if not version:
              print('ERROR: Could not determine version from tauri.conf.json')
              sys.exit(1)

          latest = {
              'version': f'v{version}',
              'notes': f'Release v{version}',
              'pub_date': datetime.datetime.now(datetime.timezone.utc).isoformat().replace('+00:00', 'Z'),
              'platforms': {}
          }

          # Mapping of file patterns to Tauri platform keys
          # Tauri 2.0 platform keys: 
          # linux-x86_64, windows-x86_64, darwin-x86_64 (intel), darwin-aarch64 (apple silicon)
          
          patterns = {
              'linux-x86_64': r'.*amd64\.AppImage$',
              'windows-x86_64': r'.*x64.*\.msi$|.*x64.*\.exe$',
              'darwin-aarch64': r'.*aarch64\.app\.tar\.gz$|.*aarch64\.dmg$',
              'darwin-x86_64': r'.*x64\.app\.tar\.gz$|.*x64\.dmg$'
          }

          print(f'Starting latest.json generation for version {version}')
          
          # Find all .sig files and map them to their binaries
          sig_files = []
          for root, _, files in os.walk('artifacts'):
              for file in files:
                  if file.endswith('.sig'):
                      sig_files.append(os.path.join(root, file))

          for sig_path in sig_files:
              binary_path = sig_path[:-4] # Remove .sig
              if not os.path.exists(binary_path):
                  print(f'Warning: Binary not found for signature {sig_path}')
                  continue
              
              filename = os.path.basename(binary_path)
              signature = ''
              with open(sig_path, 'r') as f:
                  signature = f.read().strip()
              
              # Determine platform
              matched_platform = None
              for platform, pattern in patterns.items():
                  if re.match(pattern, filename, re.IGNORECASE):
                      matched_platform = platform
                      break
              
              if matched_platform:
                  print(f'Matching {filename} to {matched_platform}')
                  download_url = f'https://github.com/genc-murat/cliqon/releases/download/v{version}/{filename}'
                  latest['platforms'][matched_platform] = {
                      'signature': signature,
                      'url': download_url
                  }
              else:
                  print(f'No platform match for {filename}')

          if not latest['platforms']:
              print('ERROR: No platforms were added to latest.json! Build will fail.')
              sys.exit(1)

          print(f'Generated latest.json: {json.dumps(latest, indent=2)}')
          with open('release_assets/latest.json', 'w') as f:
              json.dump(latest, f, indent=2)
          "
          # Copy all other assets (zip, sig, deb, etc)
          find artifacts -type f \( -name "*.zip" -o -name "*.sig" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) -exec cp {} release_assets/ \;

      - name: Create Release and Upload Files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cliqon ${{ github.ref_name }}
          files: release_assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}