name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux bağımlılıkları
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Verify Secrets (Diagnostic)
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is MISSING! Release build cannot be signed and updater metadata will NOT be generated."
            exit 1
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is present."
          fi
          if [ -z "${{ secrets.TAURI_SIGNING_PASSWORD }}" ]; then
            echo "Note: TAURI_SIGNING_PASSWORD is not set."
          fi

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}

      - name: List all artifacts recursively (Debug)
        shell: bash
        run: |
          echo "Listing all files in src-tauri/target/release/bundle:"
          find src-tauri/target/release/bundle -maxdepth 10 -not -path '*/.*'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cliqon-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/*.json
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts structure
        run: find artifacts -type f

      - name: Prepare Updater latest.json
        run: |
          mkdir -p release_assets
          # Merge all platform JSONs into one
          python3 -c "
          import json, os, glob, sys
          merged = {'version': '', 'notes': '', 'pub_date': '', 'platforms': {}}
          found = False
          print('Searching for .json files in artifacts directory...')
          for root, dirs, files in os.walk('artifacts'):
              for file in files:
                  f = os.path.join(root, file)
                  if file.endswith('.json'):
                      print(f'Checking JSON file: {f}')
                      with open(f) as j:
                          try:
                              data = json.load(j)
                              print(f'Content of {f}: {json.dumps(data, indent=2)}')
                              if 'version' in data and 'platforms' in data:
                                  found = True
                                  print(f'Found valid updater metadata in: {f}')
                                  merged['version'] = data.get('version', merged['version'])
                                  merged['notes'] = data.get('notes', merged['notes'])
                                  merged['pub_date'] = data.get('pub_date', merged['pub_date'])
                                  merged['platforms'].update(data.get('platforms', {}))
                              else:
                                  print(f'JSON file {f} does not have version and platforms keys.')
                          except Exception as e:
                              print(f'Error reading JSON {f}: {e}')
                  else:
                      print(f'Found non-JSON file: {f}')
          
          if not found:
              print('ERROR: No valid updater metadata (.json) files found! Build will fail.')
              sys.exit(1)
          
          if not merged['version']:
              print('ERROR: Merged version is empty! Build will fail.')
              sys.exit(1)
          
          print(f'Final Merged JSON: {json.dumps(merged, indent=2)}')
          with open('release_assets/latest.json', 'w') as f:
              json.dump(merged, f, indent=2)
          "
          # Copy all other assets (zip, sig, deb, etc)
          find artifacts -type f \( -name "*.zip" -o -name "*.sig" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) -exec cp {} release_assets/ \;

      - name: Create Release and Upload Files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Cliqon ${{ github.ref_name }}
          files: release_assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}